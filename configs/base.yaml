# Base config. Sweep ablations are dotlist overrides against this file.
# AUTO values come from `vision.data inspect` after real data is available.

data:
  raw_dir: data/raw
  csv: train.csv
  images: images
  ext: .jpg
  id_col: Id
  target_col: Target

cv:
  k: 5
  seed: 0
  folds_file: splits/folds.json
  clip_regex: "^(.*)_\\d+$"   # Calibrate to the real frame-id format.

model:
  backend: ultralytics        # Use `dummy` only for the CPU smoke sweep.
  size: n                     # Pick by local CV accuracy and budget.
  epochs: 100
  imgsz: 640                  # AUTO from image size
  batch: 16
  conf: 0.05                  # AP favors recall before later score sorting.
  patience: 30
  cls_gain: 0.5
  seed: 0

aug:                          # Long-tail augmentation levers.
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0

sampling:                     # Long-tail sampling levers.
  rfs: false
  rfs_thr: 0.001

sahi:                         # Small-object inference lever.
  enabled: false
  tile: 640                   # AUTO from image size
  overlap: 0.2

tta: { enabled: false }       # Multi-scale and flip inference.
tracking: { enabled: false }  # Temporal gap filling at inference.
ensemble:                     # Multi-seed rotated WBF for the final stage.
  enabled: false
  seeds: [0, 1]
  iou_thr: 0.55

sweep:
  results_csv: results.csv
  work_dir: runs
  stages: [baseline, ablations, combine, final]
  # Each ablation isolates one lever against the baseline.
  ablations:
    sahi:        ["sahi.enabled=true"]
    mixup:       ["aug.mixup=0.15"]
    mosaic_off:  ["aug.mosaic=0.0"]
    copy_paste:  ["aug.copy_paste=0.3"]
    rfs:         ["sampling.rfs=true"]
    size_s:      ["model.size=s"]
    tracking:    ["tracking.enabled=true"]
    tta:         ["tta.enabled=true"]
  # Winners must beat the baseline by this std margin before `combine`.
  win_margin_std: 1.0
